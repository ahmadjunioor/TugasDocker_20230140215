<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Form Input Mahasiswa</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<h3>Form Input Mahasiswa</h3>
<form th:action="@{/save}" th:object="${user}" method="post" class="card p-4 shadow-sm">
    <div class="mb-3">
        <label class="form-label">Nama:</label>
        <input type="text" th:field="*{nama}" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">NIM:</label>
        <input type="text" th:field="*{nim}" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label d-block">Jenis Kelamin:</label>
        <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" th:field="*{jenisKelamin}" value="Laki-laki" id="lk" required>
            <label class="form-check-label" for="lk">Laki-laki</label>
        </div>
        <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" th:field="*{jenisKelamin}" value="Perempuan" id="pr">
            <label class="form-check-label" for="pr">Perempuan</label>
        </div>
    </div>
    <div class="mt-3">
        <button type="submit" class="btn btn-primary">Submit</button>
        <a th:href="@{/home}" class="btn btn-link">Kembali ke Home</a>
    </div>
</form>
</body>
</html>
